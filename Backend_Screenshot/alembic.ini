# Alembic configuration for Creative Scanner Pro
# Run from Backend_Screenshot/:  alembic upgrade head

[alembic]
# Path to migration scripts (relative to this file)
script_location = migrations

# SQLAlchemy URL — overridden at runtime by env.py reading DATABASE_URL from .env
# Leave this as a placeholder; the real URL comes from core/config.py
sqlalchemy.url = sqlite:///./scanner.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
